<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelAI Booth</title>
    <!-- Fontes e Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stely.css">
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0D14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/app-icon.png">
</head>
<body>

    <!-- Tela de Flash -->
    <div id="flashOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999;"></div>

    <!-- TELA 1: ENTRADA -->
    <div id="landingPage" class="landing-container">
        <div class="landing-content">
            <div class="logo-wrapper">
                 <img src="img/logo.png" alt="Logo PixelAI" class="logo-landing">
                 <h1 class="orbitron-title">PIXEL<span class="cyan-text">AI</span></h1>
                 <p class="slogan">SUA MELHOR VERSÃO, CRIADA PELA IA.</p>
            </div>
            <button id="startBtn" class="btn-start">INICIAR EXPERIÊNCIA</button>
        </div>
    </div>

    <!-- TELA 2: SELEÇÃO DE TEMAS -->
    <div id="themeSelection" class="landing-container" style="display: none; flex-direction: column;">
        <h2 class="orbitron-title" style="font-size: 2rem; margin-bottom: 30px;">ESCOLHA SEU <span class="cyan-text">ESTILO</span></h2>
        <div class="themes-grid">
            <div class="theme-card" onclick="selectTheme('e_background_removal/u_Disco,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Estilo Disco')">
                <div class="theme-badge">1</div>
                <div class="theme-preview" style="background: url('img/DISCO.jpeg') center center / cover no-repeat; background-color: #000;"></div>
                <span>DISCO 🪩</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_background_removal/u_Rei,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Estilo Real')">
                <div class="theme-badge">2</div>
                <div class="theme-preview" style="background: url('img/ROYALTY.jpeg') center center / cover no-repeat; background-color: #000;"></div>
                <span>👑 ROYALTY</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_background_removal/u_Las_Vegas,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Estilo Vegas')">
                <div class="theme-badge">3</div>
                <div class="theme-preview" style="background: url('img/VEGAS.jpeg') center center / cover no-repeat; background-color: #000;"></div>
                <span>🎰 VEGAS</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_background_removal/u_Alien,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Estilo Alien')">
                <div class="theme-badge">4</div>
                <div class="theme-preview" style="background: url('img/ALIEN.jpeg') center center / cover no-repeat; background-color: #000;"></div>
                <span>👽 ALIEN</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_background_removal/u_fada_floresta,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Floresta Encantada')">
                <div class="theme-badge">5</div>
                <div class="theme-preview" style="background: url('img/fada_floresta.jpg') center center / cover no-repeat; background-color: #000;"></div>
                <span>🧚 FLORESTA</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_background_removal/u_Praia,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply', 'Estilo Praia')">
                <div class="theme-badge">6</div>
                <div class="theme-preview" style="background: url('img/Praia.jpeg') center center / cover no-repeat; background-color: #000;"></div>
                <span>🏖️ PRAIA</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_improve', 'Teste 7')">
                <div class="theme-badge">7</div>
                <div class="theme-preview" style="background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem;">⚙️</div>
                <span>TESTE 7</span>
            </div>

            <div class="theme-card" onclick="selectTheme('e_improve', 'Teste 8')">
                <div class="theme-badge">8</div>
                <div class="theme-preview" style="background: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem;">⚙️</div>
                <span>TESTE 8</span>
            </div>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="mainApp" style="display: none;">
        <div class="header-app">
            <img src="img/logo.png" alt="Logo PixelAI" class="logo-app">
            <div id="currentThemeTag" class="theme-tag">TEMA: <span>NENHUM</span></div>
        </div>

        <!-- FASE 1: CAPTURA -->
        <div id="captureStage" class="app-card">
            <div id="container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none;"></canvas>
                <div id="countdown"></div>
                <button id="switchCameraBtn" class="btn-switch-camera">🔄</button>
                <div id="cameraError" style="display:none; text-align:center; color:#ff4d4d; padding:20px; font-family:'Orbitron', sans-serif; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:100%; background:rgba(0,0,0,0.8); z-index:10;">
                    <span style="font-size: 3rem;">⚠️</span><br>
                    <b id="errTitle"></b><br><small id="errMsg"></small>
                </div>
            </div>
            <div class="controls">
                <select id="aiStyle" style="display: none;">
                    <option value="e_background_removal/u_Disco,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">🪩 Disco</option>
                    <option value="e_background_removal/u_Rei,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">👑 Royalty</option>
                    <option value="e_background_removal/u_Las_Vegas,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">🎰 Vegas</option>
                    <option value="e_background_removal/u_Alien,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">👽 Alien</option>
                    <option value="e_background_removal/u_fada_floresta,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">🧚 Floresta</option>
                    <option value="e_background_removal/u_Praia,c_scale,w_1.0,h_1.0,fl_relative/fl_layer_apply">🏖️ Praia</option>
                    <option value="e_improve">⚙️ Teste 7</option>
                    <option value="e_improve">⚙️ Teste 8</option>
                </select>
                <button id="captureBtn" disabled>📸 TIRAR FOTO</button>
                <button id="changeThemeBtn" class="btn-change-theme">✨ TROCAR TEMA</button>
                <button id="uploadBtn">📁 ANEXAR IMAGEM</button>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
        </div>

        <!-- FASE 2: PRÉVIA -->
        <div id="previewStage" class="app-card" style="display: none;">
            <div class="preview-container">
                <div class="loading-wrapper">
                    <p id="status">🚀 Criando sua arte...</p>
                    <div class="progress-bar-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                </div>
                <img id="finalPreview" src="" alt="Sua Foto">
            </div>
            <div class="result-actions">
                <div id="qrcode"></div>
                <p class="qr-text">Digitalize para baixar</p>
                
                <button id="downloadBtn" class="btn-download" style="display: none;">
                    📥 BAIXAR FOTO
                </button>

                <button id="resetBtn" class="btn-reset">🔄 RECOMEÇAR</button>
            </div>
        </div>

        <!-- FASE 3: GALERIA -->
        <div id="gallerySection" class="gallery-container" style="display: none;">
            <div class="gallery-header">
                <h2 class="orbitron-title" style="font-size: 1.5rem; margin: 0;">📸 GALERIA DE FOTOS</h2>
                <div class="gallery-controls">
                    <button id="openTvBtn" class="btn-tv">📺 TRANSMITIR (TV)</button>
                    <button id="clearGalleryBtn" class="btn-clear">🗑️ LIMPAR</button>
                </div>
            </div>
            <div id="galeria"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Falha ao registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
